<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
    <div class="card-header"></div>
    <div class="card-body">
        <img class="avatar" src="icons/user-circle.png" alt="profile">
        <h2>Adel Jarour</h2>
        <p class="location"><img src="icons/map-marker.png" alt="location"> Gaza</p>
        <p class="bio">
            Developer | Engineer | Problem Solver<br>
            Master of shadows and the Internet!
        </p>
        <p class="setting">
            <img src="icons/gear.png" alt="setting">
            <a class="edit" href="#"> edit profile</a>
        </p>
    </div>
</div>
</body>
</html>
