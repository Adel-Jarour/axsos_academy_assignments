<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Network</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <div class="navbar">
      <h2>Network</h2>
    </div>

    <h1>Your Feed</h1>
    <div class="container">
      <!-- Left Profile Card -->
      <div class="profile">
        <img src="user.png" alt="user-circle" class="avatar" />
        <a href="#">Add an avatar</a>
        <h3>James Doe</h3>
      </div>

      <!-- Feed -->
      <div class="feed">
        <!-- Post 1 -->
        <div class="card">
          <div class="top">
            <h3>Neil M</h3>
            <div>
              <span class="likeWrapper">
                <span class="likeCount">0</span> like(s)
              </span>
              <button onclick="addLike(this)">Like</button>
            </div>
          </div>
          <p>
            I just set up this new discord bot, let me know what you all think.
            <a href="#">link</a>
          </p>
        </div>

        <!-- Post 2 -->
        <div class="card">
          <div class="top">
            <h3>Nichole K</h3>
            <div>
              <span class="likeWrapper">
                <span class="likeCount">0</span> like(s)
              </span>
              <button onclick="addLike(this)">Like</button>
            </div>
          </div>
          <p>Just finished my <a href="#">next comic</a>, check it out.</p>
        </div>

        <!-- Post 3 -->
        <div class="card">
          <div class="top">
            <h3>Jim R</h3>
            <div>
              <span class="likeWrapper">
                <span class="likeCount">0</span> like(s)
              </span>
              <button onclick="addLike(this)">Like</button>
            </div>
          </div>
          <p>
            I can't stop listening to the <a href="#">new album</a>. Who else is
            liking it?
          </p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
