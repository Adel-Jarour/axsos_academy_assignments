<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Dojonary</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="navbar">
      <h1>Dojonary</h1>
      <input type="text" placeholder="Search" />
      <button id="authBtn">Login</button>
    </div>
    <div class="container">
      <div class="left">
        <div class="card">
          <div class="card-left">
            <h2>ninja</h2>
            <p class="type">noun</p>
            <p>Plural: <span class="type">ninjas</span></p>
            <button class="likeBtn">13 likes</button>
          </div>
          <div class="card-right">
            <p>
              A practitioner skilled in the
              <a href="#">Japanese</a> art of <a href="#">ninjutsu</a>
            </p>
          </div>
        </div>
        <div class="card">
          <div class="card-left">
            <h2>ninja</h2>
            <p class="type">noun</p>
            <p>Plural: <span class="type">ninjas</span></p>
            <button class="likeBtn">37 likes</button>
          </div>
          <div class="card-right">
            <p>
              A <a href="#">programmer</a> who breaks down problems with
              <a href="#">zen</a>-like focus
            </p>
          </div>
        </div>
      </div>
      <div class="right">
        <p><strong>Dojonary is defined by YOU</strong></p>
        <button id="addDefBtn">Add Definition</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
